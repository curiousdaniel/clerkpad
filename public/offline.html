<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e3a5f" />
    <title>ClerkBid — Offline</title>
    <style>
      :root {
        --navy: #1e3a5f;
        --gold: #c9a227;
        --surface: #f4f6f9;
        --ink: #1a1a1a;
        --muted: #5c6570;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--surface);
        color: var(--ink);
        padding: 1.5rem;
      }
      main {
        max-width: 22rem;
        text-align: center;
      }
      .brand {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--navy);
        margin-bottom: 1.5rem;
      }
      .brand span {
        color: var(--gold);
      }
      .icon {
        width: 3rem;
        height: 3rem;
        margin: 0 auto 1rem;
        color: var(--navy);
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--navy);
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0;
        font-size: 0.9375rem;
        line-height: 1.5;
        color: var(--muted);
      }
      p + p {
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">Clerk<span>Bid</span></div>
      <svg
        class="icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M12 13v8" />
        <path
          d="M4.14 15.5A4 4 0 0 1 6.5 8.5a4 4 0 0 1 7-2.32 4 4 0 0 1 6.36 4.5"
        />
        <line x1="2" x2="22" y1="2" y2="22" />
      </svg>
      <h1>You&rsquo;re offline</h1>
      <p>
        ClerkBid needs a network connection the first time after you install,
        so it can save pages for offline use.
      </p>
      <p>
        When you&rsquo;re back online, open the app once while signed in, then
        you can use it without Wi‑Fi until your session expires.
      </p>
    </main>
    <script>
      window.addEventListener("online", function () {
        location.reload();
      });
    </script>
  </body>
</html>
